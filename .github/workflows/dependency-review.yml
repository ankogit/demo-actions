# Dependency Review — проверка зависимостей в PR
# Демонстрирует: защита от уязвимостей при обновлении package.json

name: Dependency Review

on:
  pull_request:
    branches: [main, master]
    paths:
      - "package.json"
      - "package-lock.json"
      - "yarn.lock"
      - "pnpm-lock.yaml"

permissions:
  contents: read
  pull-requests: write

jobs:
  dependency-review:
    name: Review dependencies
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
