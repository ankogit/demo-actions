# Manual — ручной запуск из вкладки Actions
# Демонстрирует: workflow_dispatch, inputs, артефакты

name: Manual Run

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production
      message:
        description: "Custom message"
        required: false
        default: "Triggered manually"

jobs:
  build-artifact:
    name: Build artifact
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - run: npm ci

      - name: Generate build info
        run: |
          echo '{ "timestamp": "'$(date -Iseconds)'", "environment": "${{ inputs.environment }}", "message": "${{ inputs.message }}", "runId": "${{ github.run_id }}" }' > build-info.json

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ inputs.environment }}-${{ github.run_id }}
          path: build-info.json

  report:
    name: Report
    runs-on: ubuntu-latest
    needs: build-artifact
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          pattern: build-*
          merge-multiple: true

      - name: Show build info
        run: |
          echo "=== Build Info ==="
          cat build-info.json
