# Учебный пайплайн: линт → тесты → сборка → артефакты → деплой на Pages из артефакта
# Запуск: push или PR в main/master (деплой только при push в main/master)

name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  pipeline:
    name: Lint · Test · Build · Artifacts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test:ci

      - name: Build
        run: npm run build

      - name: Build site for Pages
        run: |
          mkdir -p dist
          VERSION=$(node -p "require('./package.json').version")
          NAME=$(node -p "require('./package.json').name")
          sed -e "s/{{VERSION}}/$VERSION/g" -e "s/{{NAME}}/$NAME/g" deploy/index.html.template > dist/index.html

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifacts
          path: |
            coverage/
            release/
            dist/

  deploy:
    name: Deploy to GitHub Pages
    needs: pipeline
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: github-pages
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: artifacts

      - name: Deploy to Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Publish
        uses: actions/deploy-pages@v4
